        <section class="formulario-de-pago">
            <div><h2 class="titulo-formulario">FORMULARIO DE COMPRA</h2></div>
<form class="row g-3 needs-validation" novalidate>
  <div class="col-2"></div>
  <div class="row col-8">
    <div class="col-md-4">
      <label for="validationCustom01" class="form-label">Nombre</label>
      <input type="text" class="form-control" id="validationCustom01" value="Mark" required>
      <div class="valid-feedback">
        Looks good!
      </div>
    </div>
    <div class="col-md-4">
      <label for="validationCustom02" class="form-label">Apellido</label>
      <input type="text" class="form-control" id="validationCustom02" value="Otto" required>
      <div class="valid-feedback">
        Looks good!
      </div>
    </div>
    <div class="col-md-4">
      <label for="validationCustomUsername" class="form-label">Email</label>
      <div class="input-group has-validation">
        <span class="input-group-text" id="inputGroupPrepend">@</span>
        <input type="text" class="form-control" id="validationCustomUsername" aria-describedby="inputGroupPrepend" required>
        <div class="invalid-feedback">
          Please choose a username.
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <label class="form-label">Número de tarjeta</label>
      <input type="text" class="form-control" placeholder="1234 5678 9012 3456" required>
      <div class="invalid-feedback">
        Please provide a valid city.
      </div>
    </div>
    <div class="col-md-3">
      <label for="validationCustom04" class="form-label">Tipo de tarjeta</label>
      <select class="form-select" id="validationCustom04" required>
        <option selected disabled value="">seleccionar</option>
        <option>Visa</option>
        <option>Mastercart</option>
        <option>Prex</option>
        <option>American Express</option>
      </select>
    </div>

    <div class="col-md-3">
      <label for="validationCustom04" class="form-label">Metodo de pago</label>
      <select class="form-select" id="validationCustom04" required>
        <option selected disabled value="">seleccionar</option>
        <option>Credito</option>
        <option>Debito</option>
    
      </select>
    </div>
    <div class="col-md-3">
      <label for="validationCustom05" class="form-label">Codigo de seguridad</label>
      <input type="text" class="form-control" id="validationCustom05" required>
      <div class="invalid-feedback">
        Please provide a valid zip.
      </div>
    </div>
    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
        <label class="form-check-label" for="invalidCheck">
          Agree to terms and conditions
        </label>
        <div class="invalid-feedback">
          You must agree before submitting.
        </div>
      </div>
    </div>
    <div class="col-12"> <br>
      <button class="btn btn-primary" type="submit">Submit form</button>
    </div>
  </div>
  <div class="col-2"></div>
</form>
